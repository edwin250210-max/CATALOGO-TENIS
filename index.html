<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TENIS NATALIA</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

h1{
text-align:center;
font-size:60px;
margin-top:30px;
}

h2{
text-align:center;
font-size:70px;
margin-top:20px;
margin-bottom:20px;
letter-spacing:4px;
font-weight:900;
}

.menu-tallas{
text-align:center;
padding:15px;
background:#f4f4f4;
position:sticky;
top:0;
z-index:1000;
}

.menu-tallas button{
display:inline-block;
padding:20px 30px;
margin:10px;
background:black;
color:white;
border:none;
font-size:30px;
border-radius:14px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
cursor:pointer;
}

.product img{
width:100%;
display:block;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.viewer img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<h1>SELECCIONA TU TALLA</h1>

<div class="menu-tallas">

<button onclick="cargar('315186315401','22')">22</button>
<button onclick="cargar('315186348169','22.5')">22.5</button>
<button onclick="cargar('315186380937','23')">23</button>
<button onclick="cargar('315186413705','23.5')">23.5</button>
<button onclick="cargar('315186446473','24')">24</button>
<button onclick="cargar('315186479241','24.5')">24.5</button>
<button onclick="cargar('315186512009','25')">25</button>
<button onclick="cargar('315186544777','25.5')">25.5</button>
<button onclick="cargar('315186217097','26')">26</button>
<button onclick="cargar('315186577545','26.5')">26.5</button>
<button onclick="cargar('315186610313','27')">27</button>
<button onclick="cargar('315186643081','27.5')">27.5</button>
<button onclick="cargar('315186675849','28')">28</button>
<button onclick="cargar('315186708617','28.5')">28.5</button>

</div>

<h2 id="titulo">TALLA 22</h2>

<div class="grid" id="productos"></div>

<!-- detector de scroll -->
<div id="sentinel"></div>

<div class="viewer" id="viewer" onclick="cerrar()">
<img id="imagenGrande">
</div>

<script>

const domain="cb8300-4.myshopify.com";
const token="7f3dd550a0b28421734c9aea7fa6b224";

let cursorGlobal = null;
let cargando = false;
let collectionGlobal = null;
let observer;

async function cargar(collectionId, talla){

collectionGlobal = collectionId;
cursorGlobal = null;

document.getElementById("titulo").innerText="TALLA "+talla;
document.getElementById("productos").innerHTML="";

if(observer) observer.disconnect();

await cargarMas();

// volver a activar observer
observer = new IntersectionObserver((entries) => {
if(entries[0].isIntersecting){
cargarMas();
}
},{
rootMargin:"200px"
});

observer.observe(document.getElementById("sentinel"));
}

async function cargarMas(){

if(cargando) return;
cargando = true;

let query=`
{
collection(id:"gid://shopify/Collection/${collectionGlobal}") {
products(first:12 ${cursorGlobal ? ', after:"'+cursorGlobal+'"' : ''}) {
edges{
cursor
node{
images(first:1){
edges{
node{
url
}
}
}
}
}
pageInfo{
hasNextPage
}
}
}
}
`;

let res=await fetch(`https://${domain}/api/2023-10/graphql.json`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Shopify-Storefront-Access-Token":token
},
body:JSON.stringify({query})
});

let data=await res.json();
let edges=data.data.collection.products.edges;

let html="";

edges.forEach(p=>{

let img=p.node.images.edges[0]?.node.url || "";

html+=`
<div class="product" onclick="abrir('${img}')">
<img src="${img}" loading="lazy">
</div>
`;

cursorGlobal = p.cursor;

});

document.getElementById("productos").innerHTML += html;

cargando = false;

if(!data.data.collection.products.pageInfo.hasNextPage){
observer.disconnect();
}
}

function abrir(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("imagenGrande").src=img;
}

function cerrar(){
document.getElementById("viewer").style.display="none";
}

// carga inicial
cargar("315186315401","22");

</script>

</body>
</html>
