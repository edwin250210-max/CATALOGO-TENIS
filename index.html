<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<style>
body{
    margin:0;
    padding:10px;
    background:#f3f3f3;
    font-family:Arial,sans-serif;
}

.tallas{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}

.talla-btn{
    background:black;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 18px;
    font-size:18px;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    background:white;
}

.card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
}

.puntos{
    display:flex;
    justify-content:center;
    gap:6px;
    padding:10px;
    flex-wrap:wrap;
}

.punto{
    width:8px;
    height:8px;
    border-radius:50%;
    background:black;
}
</style>
</head>

<body>

<div class="tallas" id="tallas"></div>

<div class="grid" id="productos"></div>

<script>

const SHOPIFY_DOMAIN = "TU-TIENDA.myshopify.com";
const STOREFRONT_TOKEN = "TU_TOKEN";

const tallas = [
"22","22.5","23","23.5",
"24","24.5","25","25.5",
"26","26.5","27","27.5",
"28","28.5"
];

let productosGlobal = [];

const tallasContainer = document.getElementById("tallas");

tallas.forEach(talla=>{

    const btn = document.createElement("button");

    btn.className = "talla-btn";

    btn.textContent = talla;

    btn.onclick = ()=>{
        cargarProductos(talla);
    };

    tallasContainer.appendChild(btn);

});

async function obtenerProductos(){

const query = `
{
  products(first: 250) {
    edges {
      node {

        title

        images(first: 1){
          edges{
            node{
              url
            }
          }
        }

        variants(first: 50){
          edges{
            node{
              title
              quantityAvailable
            }
          }
        }

      }
    }
  }
}`;

const response = await fetch(
`https://${SHOPIFY_DOMAIN}/api/2024-01/graphql.json`,
{
    method:"POST",
    headers:{
        "Content-Type":"application/json",
        "X-Shopify-Storefront-Access-Token":STOREFRONT_TOKEN
    },
    body:JSON.stringify({ query })
});

const data = await response.json();

productosGlobal = data.data.products.edges.map(p=>p.node);

}

function cargarProductos(tallaSeleccionada){

const container = document.getElementById("productos");

container.innerHTML = "";

productosGlobal.forEach(producto=>{

    const variante = producto.variants.edges.find(v =>
        v.node.title.includes(tallaSeleccionada)
    );

    if(!variante) return;

    const stock = variante.node.quantityAvailable || 0;

    if(stock <= 0) return;

    const imagen =
        producto.images.edges[0]?.node.url || "";

    const puntosHTML = Array(stock)
        .fill('<div class="punto"></div>')
        .join("");

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
        <img src="${imagen}" loading="lazy">

        <div class="puntos">
            ${puntosHTML}
        </div>
    `;

    container.appendChild(card);

});

}

(async ()=>{

await obtenerProductos();

cargarProductos("22");

})();

</script>

</body>
</html>
