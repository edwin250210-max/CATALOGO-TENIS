<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATÁLOGO TENIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  overflow: hidden;
}

/* GALERÍA PRO (SNAP) */
.galeria {
  height: 100vh;
  overflow-y: auto;
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
}

/* PRODUCTOS */
.producto {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  scroll-snap-align: start;
}

.producto img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

/* INDICADOR */
.scroll-indicador {
  position: fixed;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

.scroll-indicador.visible {
  opacity: 1;
}

/* CHEVRONS */
.chevron {
  width: 24px;
  height: 24px;
  border-right: 2px solid rgba(255,255,255,0.9);
  border-bottom: 2px solid rgba(255,255,255,0.9);
  transform: rotate(45deg);
  margin: -6px auto;
  animation: mover 1.8s infinite;
  opacity: 0;
}

/* DELAY MÁS SUAVE */
.chevron:nth-child(1) { animation-delay: 0s; }
.chevron:nth-child(2) { animation-delay: 0.2s; }
.chevron:nth-child(3) { animation-delay: 0.4s; }

/* ANIMACIÓN PREMIUM */
@keyframes mover {
  0% {
    opacity: 0;
    transform: rotate(45deg) translateY(-15px);
  }
  40% {
    opacity: 1;
  }
  80% {
    opacity: 0;
  }
  100% {
    transform: rotate(45deg) translateY(15px);
  }
}
</style>
</head>

<body>

<div class="galeria" id="galeria">

  <div class="producto">
    <img src="https://via.placeholder.com/400x400?text=Tenis+1">
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/400x400?text=Tenis+2">
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/400x400?text=Tenis+3">
  </div>

</div>

<!-- INDICADOR -->
<div class="scroll-indicador" id="indicador">
  <div class="chevron"></div>
  <div class="chevron"></div>
  <div class="chevron"></div>
</div>

<script>
const galeria = document.getElementById("galeria");
const indicador = document.getElementById("indicador");

/* MOSTRAR SOLO SI HAY MÁS CONTENIDO */
function checkScroll() {
  if (galeria.scrollHeight > galeria.clientHeight) {
    indicador.classList.add("visible");
  }
}

/* AL INICIO */
setTimeout(checkScroll, 500);

/* CONTROL INTELIGENTE */
galeria.addEventListener("scroll", () => {
  const scrollTop = galeria.scrollTop;

  if (scrollTop > 30) {
    indicador.classList.remove("visible");
  }

  if (scrollTop < 10) {
    indicador.classList.add("visible");
  }

  if (scrollTop + galeria.clientHeight >= galeria.scrollHeight - 5) {
    indicador.classList.remove("visible");
  }
});
</script>

</body>
</html>
