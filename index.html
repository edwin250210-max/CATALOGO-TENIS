<script>

var domain="cb8300-4.myshopify.com";

var token="7f3dd550a0b28421734c9aea7fa6b224";

var cursorGlobal = null;
var cargando = false;
var collectionGlobal = null;

var totalCargados = 0;
var LIMITE = 199;

var ultimoScroll = 0;

function activarScroll(){

window.onscroll = function(){

if(cargando) return;

var scrollTop =
window.pageYOffset ||
document.documentElement.scrollTop;

var windowHeight =
window.innerHeight ||
document.documentElement.clientHeight;

var docHeight = Math.max(
document.body.scrollHeight,
document.documentElement.scrollHeight,
document.body.offsetHeight,
document.documentElement.offsetHeight
);

if(scrollTop + windowHeight >= docHeight - 200){

if(scrollTop > ultimoScroll){

ultimoScroll = scrollTop;

cargarMas();

}

}

};

}

function cargar(collectionId, talla){

collectionGlobal = collectionId;

cursorGlobal = null;

totalCargados = 0;

ultimoScroll = 0;

document.getElementById("titulo").innerHTML =
"TALLA " + talla;

document.getElementById("productos").innerHTML = "";

document.getElementById("btnVerMas").style.display =
"block";

cargarMas();

activarScroll();

}

function cargarMas(){

if(cargando) return;

if(totalCargados >= LIMITE){

document.getElementById("btnVerMas").style.display =
"none";

return;

}

cargando = true;

var query =
'{ collection(id:"gid://shopify/Collection/' +
collectionGlobal +
'") { products(first:6' +
(cursorGlobal ? ', after:"' + cursorGlobal + '"' : '') +
') { edges { cursor node { images(first:1){ edges{ node{ url } } } availableForSale } } pageInfo{ hasNextPage } } } }';

var xhr = new XMLHttpRequest();

xhr.open(
"POST",
"https://" + domain + "/api/2023-10/graphql.json",
true
);

xhr.setRequestHeader(
"Content-Type",
"application/json"
);

xhr.setRequestHeader(
"X-Shopify-Storefront-Access-Token",
token
);

xhr.onreadystatechange = function(){

if(xhr.readyState === 4){

cargando = false;

if(xhr.status === 200){

var data = JSON.parse(xhr.responseText);

procesarProductos(data);

}

}

};

xhr.send(JSON.stringify({
query:query
}));

}

function procesarProductos(data){

if(
!data ||
!data.data ||
!data.data.collection
){
return;
}

var edges =
data.data.collection.products.edges;

var contenedor =
document.getElementById("productos");

for(var i=0; i<edges.length; i++){

var p = edges[i];

var base = "";

if(
p.node.images.edges.length > 0
){

base =
p.node.images.edges[0].node.url;

}

var imgSmall =
base ? base + "&width=400" : "";

var imgBig =
base ? base + "&width=1200" : "";

var div =
document.createElement("div");

div.className = "product";

var puntos = "";

if(p.node.availableForSale){

for(var j=0; j<6; j++){

puntos +=
'<span class="dot"></span>';

}

}

div.innerHTML =

'<img loading="lazy" src="' +
imgSmall +
'">' +

'<div class="stock-dots">' +
puntos +
'</div>';

div.onclick = (function(img){

return function(){

abrir(img);

}

})(imgBig);

contenedor.appendChild(div);

cursorGlobal = p.cursor;

totalCargados++;

}

if(
!data.data.collection.products.pageInfo
.hasNextPage
){

document.getElementById("btnVerMas")
.style.display = "none";

}

}

function abrir(img){

document.getElementById("viewer")
.style.display = "flex";

document.getElementById("imagenGrande")
.src = img;

}

function cerrar(){

document.getElementById("viewer")
.style.display = "none";

}

cargar("315186315401","22");

</script>
