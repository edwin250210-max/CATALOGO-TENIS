<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATÁLOGO TENIS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
}

/* GALERÍA */
.galeria {
  height: 100vh;
  overflow-y: auto;
  scroll-behavior: smooth;
}

/* PRODUCTOS */
.producto {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.producto img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

/* INDICADOR PREMIUM */
.scroll-indicador {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

/* CUANDO ESTÁ VISIBLE */
.scroll-indicador.visible {
  opacity: 1;
}

/* CHEVRONS */
.chevron {
  width: 26px;
  height: 26px;
  border-right: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(45deg);
  margin: -8px auto;
  animation: mover 1.6s infinite;
  opacity: 0;
}

/* DELAY PARA EFECTO FLUIDO */
.chevron:nth-child(1) {
  animation-delay: 0s;
}
.chevron:nth-child(2) {
  animation-delay: 0.25s;
}
.chevron:nth-child(3) {
  animation-delay: 0.5s;
}

/* ANIMACIÓN SUAVE */
@keyframes mover {
  0% {
    opacity: 0;
    transform: rotate(45deg) translateY(-12px);
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: rotate(45deg) translateY(12px);
  }
}
</style>
</head>

<body>

<div class="galeria" id="galeria">

  <!-- PRODUCTOS -->
  <div class="producto"><img src="https://via.placeholder.com/400x400?text=Tenis+1"></div>
  <div class="producto"><img src="https://via.placeholder.com/400x400?text=Tenis+2"></div>
  <div class="producto"><img src="https://via.placeholder.com/400x400?text=Tenis+3"></div>

</div>

<!-- INDICADOR -->
<div class="scroll-indicador" id="indicador">
  <div class="chevron"></div>
  <div class="chevron"></div>
  <div class="chevron"></div>
</div>

<script>
const galeria = document.getElementById("galeria");
const indicador = document.getElementById("indicador");

/* MOSTRAR AL INICIO */
setTimeout(() => {
  indicador.classList.add("visible");
}, 500);

/* CONTROL INTELIGENTE */
galeria.addEventListener("scroll", () => {
  const scrollTop = galeria.scrollTop;

  // Oculta si baja
  if (scrollTop > 50) {
    indicador.classList.remove("visible");
  }

  // Muestra si vuelve arriba
  if (scrollTop < 10) {
    indicador.classList.add("visible");
  }

  // Oculta al final
  if (galeria.scrollTop + galeria.clientHeight >= galeria.scrollHeight - 5) {
    indicador.classList.remove("visible");
  }
});
</script>

</body>
</html>
