<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TENIS NATALIA</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

h1{
text-align:center;
font-size:60px;
margin-top:30px;
}

h2{
text-align:center;
font-size:70px;
margin-top:20px;
margin-bottom:20px;
letter-spacing:4px;
font-weight:900;
}

.menu-tallas{
text-align:center;
padding:15px;
background:#f4f4f4;
position:sticky;
top:0;
z-index:1000;
}

.menu-tallas button{
display:inline-block;
padding:20px 30px;
margin:10px;
background:black;
color:white;
border:none;
font-size:30px;
border-radius:14px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
cursor:pointer;
opacity:1;
transform:translateY(0);
transition:all 0.3s ease;
}

.product.oculto{
opacity:0;
transform:translateY(15px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
display:block;
}

/* 🔥 VIEWER */
.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.viewer img{
max-width:95%;
max-height:95%;
object-fit:contain;
border-radius:12px;
}

/* 🔥 FLECHA TIPO IPHONE */
.scroll-indicator{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
z-index:1000;
pointer-events:none;
}

/* CHEVRONS */
.chevron{
width:22px;
height:22px;
border-right:2px solid #000;
border-bottom:2px solid #000;
transform:rotate(45deg);
margin:-6px auto;
animation:mover 1.6s infinite;
opacity:0;
}

.chevron:nth-child(1){ animation-delay:0s; }
.chevron:nth-child(2){ animation-delay:0.2s; }
.chevron:nth-child(3){ animation-delay:0.4s; }

/* ANIMACIÓN */
@keyframes mover{
0%{
opacity:0;
transform:rotate(45deg) translateY(-10px);
}
50%{
opacity:1;
}
100%{
opacity:0;
transform:rotate(45deg) translateY(10px);
}
}

#sentinel{
height:120px;
}

</style>
</head>

<body>

<h1>SELECCIONA TU TALLA</h1>

<div class="menu-tallas">

<button onclick="cargar('315186315401','22')">22</button>
<button onclick="cargar('315186348169','22.5')">22.5</button>
<button onclick="cargar('315186380937','23')">23</button>
<button onclick="cargar('315186413705','23.5')">23.5</button>
<button onclick="cargar('315186446473','24')">24</button>
<button onclick="cargar('315186479241','24.5')">24.5</button>
<button onclick="cargar('315186512009','25')">25</button>
<button onclick="cargar('315186544777','25.5')">25.5</button>
<button onclick="cargar('315186217097','26')">26</button>
<button onclick="cargar('315186577545','26.5')">26.5</button>
<button onclick="cargar('315186610313','27')">27</button>
<button onclick="cargar('315186643081','27.5')">27.5</button>
<button onclick="cargar('315186675849','28')">28</button>
<button onclick="cargar('315186708617','28.5')">28.5</button>

</div>

<h2 id="titulo">TALLA 22</h2>

<div class="grid" id="productos"></div>

<div id="sentinel"></div>

<!-- 🔥 FLECHA NUEVA -->
<div class="scroll-indicator" id="flecha">
  <div class="chevron"></div>
  <div class="chevron"></div>
  <div class="chevron"></div>
</div>

<div class="viewer" id="viewer" onclick="cerrar()">
<img id="imagenGrande">
</div>

<script>

const domain="cb8300-4.myshopify.com";
const token="7f3dd550a0b28421734c9aea7fa6b224";

let cursorGlobal = null;
let cargando = false;
let collectionGlobal = null;

let totalCargados = 0;
const LIMITE = 100;

let observer;

async function cargar(collectionId, talla){

collectionGlobal = collectionId;
cursorGlobal = null;
totalCargados = 0;

document.getElementById("titulo").innerText="TALLA "+talla;
document.getElementById("productos").innerHTML="";

if(observer) observer.disconnect();

// mostrar flecha
document.getElementById("flecha").style.display = "block";

await cargarMas();
activarScroll();
}

function activarScroll(){

observer = new IntersectionObserver((entries) => {
if(entries[0].isIntersecting && !cargando){
cargarMas();
}
},{
rootMargin:"300px"
});

observer.observe(document.getElementById("sentinel"));

window.addEventListener("scroll", () => {

// ocultar flecha al bajar
if(window.scrollY > 150){
document.getElementById("flecha").style.display = "none";
}

if(cargando) return;

let scrollTop = window.scrollY;
let windowHeight = window.innerHeight;
let docHeight = document.body.offsetHeight;

if(scrollTop + windowHeight > docHeight - 400){
cargarMas();
}

});

}

async function cargarMas(){

if(cargando) return;
if(totalCargados >= LIMITE){
if(observer) observer.disconnect();
document.getElementById("flecha").style.display = "none";
return;
}

cargando = true;

let query=`
{
collection(id:"gid://shopify/Collection/${collectionGlobal}") {
products(first:6 ${cursorGlobal ? ', after:"'+cursorGlobal+'"' : ''}) {
edges{
cursor
node{
images(first:1){
edges{
node{
url
}
}
}
}
}
pageInfo{
hasNextPage
}
}
}
}
`;

let res=await fetch(`https://${domain}/api/2023-10/graphql.json`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Shopify-Storefront-Access-Token":token
},
body:JSON.stringify({query})
});

let data=await res.json();
let edges=data.data.collection.products.edges;

const contenedor = document.getElementById("productos");

edges.forEach(p=>{

let base = p.node.images.edges[0]?.node.url || "";

let imgSmall = base ? base + "&width=400" : "";
let imgBig = base ? base + "&width=1200" : "";

let div = document.createElement("div");
div.className = "product oculto";

div.innerHTML = `<img src="${imgSmall}" loading="lazy">`;

div.onclick = () => abrir(imgBig);

contenedor.appendChild(div);

requestAnimationFrame(()=>{
div.classList.remove("oculto");
});

cursorGlobal = p.cursor;
totalCargados++;

});

cargando = false;

// si ya no hay más productos, ocultar flecha
if(!data.data.collection.products.pageInfo.hasNextPage){
document.getElementById("flecha").style.display = "none";
if(observer) observer.disconnect();
}

}

function abrir(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("imagenGrande").src=img;
}

function cerrar(){
document.getElementById("viewer").style.display="none";
}

// carga inicial
cargar("315186315401","22");

</script>

</body>
</html>
