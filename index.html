<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TENIS NATALIA</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

h1{
text-align:center;
font-size:40px;
margin-top:20px;
}

h2{
text-align:center;
font-size:30px;
margin:15px;
}

.menu-tallas{
text-align:center;
padding:10px;
background:#f4f4f4;
position:sticky;
top:0;
z-index:1000;
}

.menu-tallas button{
padding:10px 15px;
margin:5px;
background:black;
color:white;
border:none;
font-size:16px;
border-radius:10px;
}

.grid{
display:flex;
flex-wrap:wrap;
padding:10px;
}

/* 📱 BASE */
.product{
width:48%;
margin:1%;
background:white;
border-radius:10px;
overflow:hidden;
}

/* 📱 MEDIO */
@media screen and (min-width:400px){
.product{
width:31%;
}
}

/* 📲 GRANDE */
@media screen and (min-width:500px){
.product{
width:23%;
}
}

.product img{
width:100%;
height:140px;
object-fit:cover;
}

/* 🔥 BOTÓN */
.ver-mas{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:18px;
font-size:22px;
font-weight:bold;
background:black;
color:white;
border:none;
border-radius:12px;
z-index:999;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
}

.viewer img{
max-width:95%;
max-height:95%;
}

</style>
</head>

<body>

<h1>SELECCIONA TU TALLA</h1>

<div class="menu-tallas">
<button onclick="cargar('315186315401','22')">22</button>
<button onclick="cargar('315186348169','22.5')">22.5</button>
<button onclick="cargar('315186380937','23')">23</button>
<button onclick="cargar('315186413705','23.5')">23.5</button>
<button onclick="cargar('315186446473','24')">24</button>
<button onclick="cargar('315186479241','24.5')">24.5</button>
<button onclick="cargar('315186512009','25')">25</button>
<button onclick="cargar('315186544777','25.5')">25.5</button>
<button onclick="cargar('315186217097','26')">26</button>
<button onclick="cargar('315186577545','26.5')">26.5</button>
<button onclick="cargar('315186610313','27')">27</button>
<button onclick="cargar('315186643081','27.5')">27.5</button>
<button onclick="cargar('315186675849','28')">28</button>
<button onclick="cargar('315186708617','28.5')">28.5</button>
</div>

<h2 id="titulo">TALLA 22</h2>

<div class="grid" id="productos"></div>

<button class="ver-mas" id="btnVerMas" onclick="cargarMas()">VER MÁS MODELOS 🔥</button>

<div class="viewer" id="viewer" onclick="cerrar()">
<img id="imagenGrande">
</div>

<script>

var domain="cb8300-4.myshopify.com";
var token="7f3dd550a0b28421734c9aea7fa6b224";

var cursorGlobal = null;
var cargando = false;
var collectionGlobal = null;

var totalCargados = 0;
var LIMITE = 100;

/* 🔥 SCROLL SIMPLE COMPATIBLE */
var timeoutScroll;

function activarScroll(){

window.onscroll = function(){

if(cargando) return;

clearTimeout(timeoutScroll);

timeoutScroll = setTimeout(function(){

var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
var windowHeight = window.innerHeight || document.documentElement.clientHeight;
var docHeight = document.documentElement.scrollHeight;

if(scrollTop + windowHeight >= docHeight - 200){
cargarMas();
}

},200);

};
}

function cargar(collectionId, talla){

collectionGlobal = collectionId;
cursorGlobal = null;
totalCargados = 0;

document.getElementById("titulo").innerHTML="TALLA "+talla;
document.getElementById("productos").innerHTML="";
document.getElementById("btnVerMas").style.display="block";

cargarMas();
activarScroll();
}

function cargarMas(){

if(cargando) return;
if(totalCargados >= LIMITE){
document.getElementById("btnVerMas").style.display="none";
return;
}

cargando = true;

var query = '{ collection(id:"gid://shopify/Collection/' + collectionGlobal + '") { products(first:6 ' + (cursorGlobal ? ', after:"'+cursorGlobal+'"' : '') + ') { edges{ cursor node{ images(first:1){ edges{ node{ url } } } } } pageInfo{ hasNextPage } } } }';

var xhr = new XMLHttpRequest();
xhr.open("POST","https://" + domain + "/api/2023-10/graphql.json",true);
xhr.setRequestHeader("Content-Type","application/json");
xhr.setRequestHeader("X-Shopify-Storefront-Access-Token",token);

xhr.onreadystatechange = function(){
if(xhr.readyState === 4 && xhr.status === 200){

var data = JSON.parse(xhr.responseText);
procesarProductos(data);

}
};

xhr.send(JSON.stringify({query:query}));
}

function procesarProductos(data){

var edges = data.data.collection.products.edges;
var contenedor = document.getElementById("productos");

for(var i=0; i<edges.length; i++){

var p = edges[i];

var base = "";
if(p.node.images.edges.length > 0){
base = p.node.images.edges[0].node.url;
}

var imgSmall = base ? base + "&width=400" : "";
var imgBig = base ? base + "&width=1200" : "";

var div = document.createElement("div");
div.className = "product";

div.innerHTML = '<img src="'+imgSmall+'"><p style="text-align:center;font-size:14px;">Disponible</p>';

div.onclick = (function(img){
return function(){ abrir(img); }
})(imgBig);

contenedor.appendChild(div);

cursorGlobal = p.cursor;
totalCargados++;

}

cargando = false;

if(!data.data.collection.products.pageInfo.hasNextPage){
document.getElementById("btnVerMas").style.display="none";
}

}

function abrir(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("imagenGrande").src=img;
}

function cerrar(){
document.getElementById("viewer").style.display="none";
}

/* INICIO */
cargar("315186315401","22");

</script>

</body>
</html>
