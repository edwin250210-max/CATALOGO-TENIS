<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CATALOGO TENIS</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

h1{
text-align:center;
font-size:60px;
margin-top:30px;
}

h2{
text-align:center;
font-size:70px;
margin-top:20px;
margin-bottom:20px;
letter-spacing:4px;
font-weight:900;
}

.menu-tallas{
text-align:center;
margin:20px;
}

.menu-tallas button{
display:inline-block;
padding:25px 27px;
margin:12px;
background:black;
color:white;
border:none;
font-size:25px;
border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
cursor:pointer;
}

.product img{
width:100%;
display:block;
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.viewer img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<h1>TENIS CATALOGO</h1>

<div class="menu-tallas">

<button onclick="cargar('315186315401','22')">22</button>
<button onclick="cargar('315186348169','22.5')">22.5</button>
<button onclick="cargar('315186380937','23')">23</button>
<button onclick="cargar('315186413705','23.5')">23.5</button>
<button onclick="cargar('315186446473','24')">24</button>
<button onclick="cargar('315186479241','24.5')">24.5</button>
<button onclick="cargar('315186512009','25')">25</button>
<button onclick="cargar('315186544777','25.5')">25.5</button>
<button onclick="cargar('315186217097','26')">26</button>
<button onclick="cargar('315186577545','26.5')">26.5</button>
<button onclick="cargar('315186610313','27')">27</button>
<button onclick="cargar('315186643081','27.5')">27.5</button>
<button onclick="cargar('315186675849','28')">28</button>
<button onclick="cargar('315186708617','28.5')">28.5</button>

</div>

<h2 id="titulo">TALLA 22</h2>

<div class="grid" id="productos"></div>

<div class="viewer" id="viewer" onclick="cerrar()">
<img id="imagenGrande">
</div>

<script>

const domain="cb8300-4.myshopify.com";
const token="7f3dd550a0b28421734c9aea7fa6b224";

async function cargar(collectionId,talla){

document.getElementById("titulo").innerText="TALLA "+talla;
document.getElementById("productos").innerHTML="Cargando...";

let productos=[];
let cursor=null;
let hasNextPage=true;

while(hasNextPage){

let query=`
{
collection(id:"gid://shopify/Collection/${collectionId}") {
products(first:250 ${cursor ? ', after:"'+cursor+'"' : ''}) {
edges{
cursor
node{
images(first:1){
edges{
node{
url
}
}
}
}
}
pageInfo{
hasNextPage
}
}
}
}
`;

let res=await fetch(`https://${domain}/api/2023-10/graphql.json`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Shopify-Storefront-Access-Token":token
},
body:JSON.stringify({query})
});

let data=await res.json();

let edges=data.data.collection.products.edges;

edges.forEach(p=>{
productos.push(p.node);
cursor=p.cursor;
});

hasNextPage=data.data.collection.products.pageInfo.hasNextPage;

}

let html="";

productos.forEach(p=>{

let img=p.images.edges[0]?.node.url || "";

html+=`
<div class="product" onclick="abrir('${img}')">
<img src="${img}">
</div>
`;

});

document.getElementById("productos").innerHTML=html;

}

function abrir(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("imagenGrande").src=img;
}

function cerrar(){
document.getElementById("viewer").style.display="none";
}

cargar("315186315401","22");

</script>

</body>
</html>
