<script>

const domain = "cb8300-4.myshopify.com";
const token = "7f3dd550a0b28421734c9aea7fa6b224";

async function cargarColeccion(collectionId, contenedor){

let productos = [];
let cursor = null;
let hasNextPage = true;

while(hasNextPage){

let query = `
{
collection(id:"gid://shopify/Collection/${collectionId}") {
products(first:250 ${cursor ? ', after:"'+cursor+'"' : ''}) {
edges{
cursor
node{
title
images(first:1){
edges{
node{
url
}
}
}
}
}
pageInfo{
hasNextPage
}
}
}
}
`;

let res = await fetch(`https://${domain}/api/2023-10/graphql.json`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Shopify-Storefront-Access-Token":token
},
body:JSON.stringify({query})
});

let data = await res.json();

let edges = data.data.collection.products.edges;

edges.forEach(p=>{
productos.push(p.node);
cursor = p.cursor;
});

hasNextPage = data.data.collection.products.pageInfo.hasNextPage;

}

let html = "";

productos.forEach(p=>{

let img = p.images.edges[0]?.node.url || "";

html += `
<div class="product">
<img src="${img}">
</div>
`;

});

document.getElementById(contenedor).innerHTML = html;

}

cargarColeccion("315186315401","collection-22");

</script>
